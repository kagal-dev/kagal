syntax = "proto3";

package kagal.v1;

import "google/protobuf/any.proto";
import "kagal/v1/agent.proto";
import "kagal/v1/nonce.proto";
import "kagal/v1/task.proto";

option go_package = "kagal.dev/pkg/proto/kagal/v1;kagal";

// Error signals a protocol-level error from server to agent.
message Error {
  string code = 1;
  string message = 2;
}

// ServerMessage is the wire envelope for server-to-agent messages.
message ServerMessage {
  oneof payload {
    TaskDispatch task = 1;
    NonceRotate nonce = 2;
    Quarantine quarantine = 3;
    Error error = 4;
    google.protobuf.Any extension = 15;
  }
}

// AgentMessage is the wire envelope for agent-to-server messages.
message AgentMessage {
  oneof payload {
    Hello hello = 1;
    TaskResult task_result = 2;
    StatusReport status = 3;
    google.protobuf.Any extension = 15;
  }
}
